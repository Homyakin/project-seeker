<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Battle v4 Visualizer</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --panel-2: #1d2230;
    --border: #262b38;
    --text: #e6e8ef;
    --muted: #8a93a6;
    --team1: #4aa3ff;
    --team1-dim: #1e3b5c;
    --team2: #ff6b6b;
    --team2-dim: #5c1f1f;
    --hp: #46d17a;
    --hp-low: #e84a4a;
    --gauge: #f0c24a;
    --gauge-ready: #74e79a;
    --accent: #9a7cff;
    --crit: #ffd54a;
    --dodge: #7ad1ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px; line-height: 1.4;
  }
  body {
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  header {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    background: var(--panel);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: 0.3px; }
  .loader {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .loader label {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--panel-2); cursor: pointer; font-size: 12px;
  }
  .loader label:hover { border-color: var(--accent); }
  .loader input[type="file"] { display: none; }
  .loader .file-name { color: var(--muted); font-size: 12px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .loader .status { color: var(--muted); font-size: 12px; }
  .loader .status.err { color: var(--team2); }
  .loader .status.ok { color: var(--hp); }

  #drop-zone {
    border: 1px dashed var(--border); padding: 4px 12px; border-radius: 6px;
    color: var(--muted); font-size: 12px;
  }
  #drop-zone.drag { border-color: var(--accent); color: var(--text); background: var(--panel-2); }

  #toolbar {
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--panel);
  }
  #toolbar button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer;
    min-width: 32px; font-family: inherit;
  }
  #toolbar button:hover:not(:disabled) { border-color: var(--accent); }
  #toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
  #toolbar .group { display: flex; align-items: center; gap: 6px; }
  #toolbar .sep { width: 1px; height: 22px; background: var(--border); }
  #toolbar input[type="range"] { width: 140px; }
  #toolbar .progress {
    display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px;
    margin-left: auto;
  }
  #toolbar .progress b { color: var(--text); font-weight: 600; }
  #toolbar input[type="checkbox"] { accent-color: var(--accent); }

  main {
    flex: 1; display: grid; grid-template-columns: 1fr 340px; gap: 0;
    min-height: 0; overflow: hidden;
  }
  #battlefield-wrap {
    padding: 16px; overflow: auto; min-height: 0;
  }
  #battlefield {
    display: flex; gap: 12px; justify-content: center; align-items: stretch;
    min-height: 100%;
  }
  .lane {
    flex: 1; min-width: 150px; max-width: 260px;
    background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .lane-header {
    padding: 8px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .lane-header.team1 { background: var(--team1-dim); }
  .lane-header.team2 { background: var(--team2-dim); }
  .lane-header .pos { font-weight: 700; }
  .lane-header .team-tag { font-size: 10px; color: var(--muted); }
  .lane-body {
    flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 10px;
    min-height: 80px;
  }
  .lane-body.empty {
    color: var(--muted); font-size: 11px; align-items: center; justify-content: center;
    font-style: italic;
  }

  .personage {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; position: relative;
    transition: transform 120ms ease, box-shadow 120ms ease, opacity 200ms ease;
  }
  .personage.team1 { border-left: 3px solid var(--team1); }
  .personage.team2 { border-left: 3px solid var(--team2); }
  .personage.dead { opacity: 0.35; filter: grayscale(0.7); }
  .personage.dead .name::after { content: " ✝"; color: var(--team2); }
  .personage.moved { box-shadow: 0 0 0 2px var(--accent); }
  .personage.hit { box-shadow: 0 0 0 2px var(--team2); }
  .personage.crit { box-shadow: 0 0 0 2px var(--crit); }
  .personage.dodge-flash { box-shadow: 0 0 0 2px var(--dodge); }
  .personage.gauge-ready { box-shadow: 0 0 0 2px var(--gauge-ready); }

  .personage .name {
    font-weight: 600; font-size: 12px; display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .personage .name .id { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; font-weight: 400; }
  .bar {
    position: relative; height: 10px; background: #000; border-radius: 4px; overflow: hidden; margin-bottom: 4px;
  }
  .bar > .fill { height: 100%; transition: width 180ms ease; }
  .bar.hp > .fill { background: var(--hp); }
  .bar.hp.low > .fill { background: var(--hp-low); }
  .bar.gauge > .fill { background: var(--gauge); }
  .bar > .label {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.7); font-weight: 600;
    letter-spacing: 0.3px;
  }
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px 6px;
    font-size: 10px; color: var(--muted); margin-top: 4px;
  }
  .stats span b { color: var(--text); font-weight: 600; }

  .popup {
    position: absolute; top: 4px; right: 6px; font-weight: 700; font-size: 13px;
    color: var(--team2);
    animation: pop 900ms ease-out forwards;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .popup.crit { color: var(--crit); font-size: 15px; }
  .popup.dodge { color: var(--dodge); }
  .popup.defeat { color: var(--team2); font-size: 12px; }
  @keyframes pop {
    0%   { transform: translateY(0) scale(0.7); opacity: 0; }
    15%  { transform: translateY(-4px) scale(1.1); opacity: 1; }
    100% { transform: translateY(-30px) scale(1); opacity: 0; }
  }

  #sidebar {
    border-left: 1px solid var(--border); background: var(--panel);
    display: flex; flex-direction: column; min-height: 0; overflow: hidden;
  }
  #sidebar h2 {
    margin: 0; padding: 10px 14px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); border-bottom: 1px solid var(--border); flex: 0 0 auto;
  }
  #event-log {
    flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden; padding: 6px 0;
  }
  .event {
    padding: 6px 14px; font-size: 12px; border-bottom: 1px solid var(--panel-2);
    display: flex; gap: 8px; align-items: baseline;
  }
  .event.current { background: rgba(154, 124, 255, 0.12); }
  .event .round { color: var(--muted); font-family: ui-monospace, monospace; min-width: 40px; }
  .event .round b { color: var(--text); }
  .event .desc { flex: 1; }
  .event.round-start .desc { color: var(--accent); font-weight: 600; }
  .event.damage .desc { color: var(--text); }
  .event.crit .desc { color: var(--crit); }
  .event.dodge .desc { color: var(--dodge); }
  .event.defeat .desc { color: var(--team2); font-weight: 600; }
  .event.move .desc { color: var(--gauge-ready); }
  .event.tick .desc { color: var(--muted); }
  .event.tick.ready .desc { color: var(--gauge); }

  .pill {
    display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px;
    font-family: ui-monospace, monospace;
  }
  .pill.team1 { background: var(--team1-dim); color: var(--team1); }
  .pill.team2 { background: var(--team2-dim); color: var(--team2); }

  .empty-state {
    padding: 40px; text-align: center; color: var(--muted);
  }
  .empty-state code { background: var(--panel-2); padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>

<header>
  <h1>Battle v4 Visualizer</h1>
  <div class="loader" id="drop-zone">
    <label>
      <span>Init JSON</span>
      <input type="file" id="init-file" accept=".json,application/json">
    </label>
    <span class="file-name" id="init-name">—</span>
    <label>
      <span>Action Log JSON</span>
      <input type="file" id="log-file" accept=".json,application/json">
    </label>
    <span class="file-name" id="log-name">—</span>
    <span class="status" id="loader-status">Drop JSON files here, pick them, or pass ?init=...&amp;log=... URL params</span>
  </div>
</header>

<div id="toolbar">
  <div class="group">
    <button id="btn-reset" title="Reset (Home)">⏮</button>
    <button id="btn-step-back" title="Step back (←)">◀</button>
    <button id="btn-play" title="Play / Pause (Space)">▶</button>
    <button id="btn-step-fwd" title="Step forward (→)">▶▌</button>
    <button id="btn-end" title="Jump to end (End)">⏭</button>
  </div>
  <div class="sep"></div>
  <div class="group">
    <label>Speed</label>
    <input type="range" id="speed" min="1" max="100" value="30">
    <span id="speed-val" style="min-width: 56px; color: var(--muted);">—</span>
  </div>
  <div class="sep"></div>
  <div class="group">
    <label><input type="checkbox" id="skip-ticks" checked> skip tick events</label>
  </div>
  <div class="sep"></div>
  <div class="group">
    <label>Jump</label>
    <input type="range" id="scrubber" min="0" max="0" value="0" style="width: 220px;">
  </div>
  <div class="progress">
    Round <b id="round-now">—</b>/<span id="round-total">—</span> &nbsp;&nbsp;
    Event <b id="event-now">0</b>/<span id="event-total">0</span>
  </div>
</div>

<main>
  <div id="battlefield-wrap">
    <div id="battlefield">
      <div class="empty-state">
        <p>Load <code>battle-init.json</code> and <code>battle-action-log.json</code> to start.</p>
        <p>Produced by <code>BattleSimulator.logTest()</code> into <code>target/battle-v4-log/</code>.</p>
      </div>
    </div>
  </div>
  <aside id="sidebar">
    <h2>Event log</h2>
    <div id="event-log"></div>
  </aside>
</main>

<script>
"use strict";

// ============================================================================
// State
// ============================================================================

/** @type {{lines:Array, personagesById:Object}|null} */
let initState = null;
/** @type {Array<Object>|null} */
let events = null;

/** Current replay position: index of the NEXT event to apply (0..events.length). */
let cursor = 0;

/** Per-personage live state, keyed by id. */
let live = {};
/** Current round (from latest RoundStarted event applied). */
let currentRound = 0;
/** Total rounds in the log (computed once). */
let totalRounds = 0;

let playTimer = null;
let playSpeedMs = 120; // default, overridden by slider

const qs = new URLSearchParams(location.search);

// ============================================================================
// DOM refs
// ============================================================================

const $ = (id) => document.getElementById(id);
const el = {
  initFile: $("init-file"),
  logFile:  $("log-file"),
  initName: $("init-name"),
  logName:  $("log-name"),
  dropZone: $("drop-zone"),
  status:   $("loader-status"),

  btnReset:   $("btn-reset"),
  btnStepBack:$("btn-step-back"),
  btnPlay:    $("btn-play"),
  btnStepFwd: $("btn-step-fwd"),
  btnEnd:     $("btn-end"),
  speed:      $("speed"),
  speedVal:   $("speed-val"),
  skipTicks:  $("skip-ticks"),
  scrubber:   $("scrubber"),

  roundNow:  $("round-now"),
  roundTotal:$("round-total"),
  eventNow:  $("event-now"),
  eventTotal:$("event-total"),

  battlefield: $("battlefield"),
  eventLog:    $("event-log"),
};

// ============================================================================
// Loading inputs
// ============================================================================

function setStatus(msg, kind) {
  el.status.textContent = msg;
  el.status.className = "status" + (kind ? " " + kind : "");
}

async function readFileAsJSON(file) {
  const txt = await file.text();
  return JSON.parse(txt);
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} for ${url}`);
  return r.json();
}

function tryLoadBoth() {
  if (initState && events) {
    bootReplay();
  }
}

async function handleInit(file) {
  try {
    const data = file instanceof File ? await readFileAsJSON(file) : await fetchJSON(file);
    if (!data.lines || !data.personagesById) throw new Error("Not a BattleInitState (missing lines/personagesById)");
    initState = data;
    el.initName.textContent = file instanceof File ? file.name : file;
    setStatus(events ? "All loaded." : "Init loaded. Waiting for action log…", events ? "ok" : null);
    tryLoadBoth();
  } catch (e) {
    setStatus("Failed to load init: " + e.message, "err");
    console.error(e);
  }
}

async function handleLog(file) {
  try {
    const data = file instanceof File ? await readFileAsJSON(file) : await fetchJSON(file);
    if (!Array.isArray(data)) throw new Error("Action log must be a JSON array of events");
    events = data;
    el.logName.textContent = file instanceof File ? file.name : file;
    setStatus(initState ? "All loaded." : "Log loaded. Waiting for init…", initState ? "ok" : null);
    tryLoadBoth();
  } catch (e) {
    setStatus("Failed to load log: " + e.message, "err");
    console.error(e);
  }
}

el.initFile.addEventListener("change", (e) => {
  if (e.target.files[0]) handleInit(e.target.files[0]);
});
el.logFile.addEventListener("change", (e) => {
  if (e.target.files[0]) handleLog(e.target.files[0]);
});

// Drag & drop onto the header loader area.
["dragenter", "dragover"].forEach((t) => {
  el.dropZone.addEventListener(t, (e) => {
    e.preventDefault(); e.stopPropagation();
    el.dropZone.classList.add("drag");
  });
});
["dragleave", "drop"].forEach((t) => {
  el.dropZone.addEventListener(t, (e) => {
    e.preventDefault(); e.stopPropagation();
    el.dropZone.classList.remove("drag");
  });
});
el.dropZone.addEventListener("drop", async (e) => {
  const files = Array.from(e.dataTransfer.files);
  for (const f of files) {
    const text = await f.text();
    let parsed;
    try { parsed = JSON.parse(text); } catch { setStatus(`${f.name} is not valid JSON`, "err"); continue; }
    if (parsed && parsed.lines && parsed.personagesById) {
      initState = parsed; el.initName.textContent = f.name;
    } else if (Array.isArray(parsed)) {
      events = parsed; el.logName.textContent = f.name;
    } else {
      setStatus(`${f.name}: unknown JSON shape`, "err");
    }
  }
  if (initState && events) { setStatus("All loaded.", "ok"); bootReplay(); }
  else if (initState)      setStatus("Init loaded. Drop the action log next.");
  else if (events)         setStatus("Log loaded. Drop the init next.");
});

// Also accept body-level drops so the whole page is a target.
window.addEventListener("dragover", (e) => { e.preventDefault(); });
window.addEventListener("drop", (e) => {
  if (e.target.closest("#drop-zone")) return; // already handled
  e.preventDefault();
  el.dropZone.dispatchEvent(new DragEvent("drop", { dataTransfer: e.dataTransfer }));
});

// Auto-load from URL params when present.
(function autoFromUrl() {
  const initUrl = qs.get("init");
  const logUrl = qs.get("log");
  if (initUrl) handleInit(initUrl);
  if (logUrl)  handleLog(logUrl);
})();

// ============================================================================
// Replay initialization
// ============================================================================

function shortId(uuid) {
  return uuid ? uuid.slice(0, 6) : "—";
}

function buildInitialLive() {
  const m = {};
  for (const id in initState.personagesById) {
    const p = initState.personagesById[id];
    m[id] = {
      id,
      firstTeam: p.firstTeam,
      maxHealth: p.health,
      health: p.health,
      lineIndex: p.lineIndex,
      advanceDirection: p.advanceDirection,
      initiative: p.initiative,
      gauge: p.initiativeGauge,
      range: p.range,
      threat: p.totalThreat,
      alive: true,
      // Transient visual flags cleared on each step:
      flash: null, // "hit" | "crit" | "dodge" | "move" | "ready"
      popup: null, // { text, kind }
    };
  }
  return m;
}

function bootReplay() {
  cursor = 0;
  currentRound = 0;
  totalRounds = 0;
  for (const ev of events) if (ev.round > totalRounds) totalRounds = ev.round;
  live = buildInitialLive();
  el.eventTotal.textContent = events.length;
  el.roundTotal.textContent = totalRounds;
  el.scrubber.max = String(events.length);
  el.scrubber.value = "0";
  renderEventList();
  renderAll();
  updateButtons();
  updateSpeed();
}

// ============================================================================
// Event application
// ============================================================================

/** Apply one event, mutating `live` and `currentRound`. Returns the event. */
function applyEvent(ev) {
  clearTransientFlags();
  if ("round" in ev) currentRound = ev.round;

  if (isRoundStart(ev)) {
    // nothing visual but round
    return ev;
  }
  if ("gaugeAfterTick" in ev) {
    const p = live[ev.personageId];
    if (p) {
      p.gauge = ev.gaugeAfterTick;
      if (ev.turnGranted) p.flash = "ready";
    }
    return ev;
  }
  if ("newLineIndex" in ev) {
    const p = live[ev.personageId];
    if (p) {
      p.lineIndex = ev.newLineIndex;
      p.flash = "move";
    }
    return ev;
  }
  if (isDodge(ev)) {
    const t = live[ev.targetId];
    if (t) { t.flash = "dodge"; t.popup = { text: "DODGE", kind: "dodge" }; }
    return ev;
  }
  if ("damageTaken" in ev) {
    const t = live[ev.targetId];
    if (t) {
      t.health = ev.remainingHealth;
      t.flash = ev.roll && ev.roll.crit ? "crit" : "hit";
      t.popup = {
        text: "-" + ev.damageTaken,
        kind: ev.roll && ev.roll.crit ? "crit" : "hit",
      };
    }
    return ev;
  }
  if ("killerId" in ev) {
    const t = live[ev.personageId];
    if (t) { t.alive = false; t.popup = { text: "✝ DEFEATED", kind: "defeat" }; }
    return ev;
  }
  return ev;
}

function isRoundStart(ev) {
  const keys = Object.keys(ev);
  return keys.length === 1 && keys[0] === "round";
}
function isDodge(ev) {
  return "attackerId" in ev && "targetId" in ev && !("damageTaken" in ev);
}

function clearTransientFlags() {
  for (const id in live) {
    live[id].flash = null;
    live[id].popup = null;
  }
}

// ============================================================================
// Step / seek
// ============================================================================

function shouldSkipEvent(ev) {
  return el.skipTicks.checked && "gaugeAfterTick" in ev && !ev.turnGranted;
}

function stepForward() {
  if (!events || cursor >= events.length) return false;
  // Advance past one *visible* event, applying any skipped ones silently.
  while (cursor < events.length) {
    const ev = events[cursor++];
    if (shouldSkipEvent(ev)) {
      // apply silently (still mutate state) but do not stop
      currentRound = ev.round;
      const p = live[ev.personageId];
      if (p) p.gauge = ev.gaugeAfterTick;
      continue;
    }
    applyEvent(ev);
    break;
  }
  afterSeek();
  return true;
}

function stepBackward() {
  if (!events || cursor === 0) return;
  // Rebuild from scratch to cursor-1 (or previous visible event).
  let target = cursor - 1;
  if (el.skipTicks.checked) {
    // walk backwards until we find a non-skippable event, else 0
    while (target > 0 && shouldSkipEvent(events[target - 1])) target--;
    target = Math.max(0, target - 1);
    // reaching 0 means reset; reaching N means "N events applied"
  }
  seekTo(target);
}

/** Seek such that exactly `index` events have been applied (index in [0, events.length]). */
function seekTo(index) {
  if (!events) return;
  index = Math.max(0, Math.min(events.length, index));
  live = buildInitialLive();
  currentRound = 0;
  cursor = 0;
  while (cursor < index) {
    const ev = events[cursor++];
    if (shouldSkipEvent(ev)) {
      currentRound = ev.round;
      const p = live[ev.personageId];
      if (p) p.gauge = ev.gaugeAfterTick;
    } else {
      applyEvent(ev);
    }
  }
  afterSeek();
}

function afterSeek() {
  el.eventNow.textContent = cursor;
  el.roundNow.textContent = currentRound || "—";
  el.scrubber.value = String(cursor);
  renderAll();
  updateButtons();
  scrollEventLogToCursor();
}

// ============================================================================
// Playback
// ============================================================================

function updateSpeed() {
  // Slider 1..100 -> delay 1000..20 ms (log-ish: higher = faster)
  const v = Number(el.speed.value);
  playSpeedMs = Math.round(1020 - v * 10);
  el.speedVal.textContent = `${playSpeedMs}ms`;
  if (playTimer) {
    stopPlay();
    startPlay();
  }
}

function startPlay() {
  if (!events || cursor >= events.length) return;
  el.btnPlay.textContent = "❚❚";
  playTimer = setInterval(() => {
    const ok = stepForward();
    if (!ok || cursor >= events.length) stopPlay();
  }, playSpeedMs);
}

function stopPlay() {
  el.btnPlay.textContent = "▶";
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
}

function togglePlay() {
  if (playTimer) stopPlay();
  else startPlay();
}

function updateButtons() {
  const loaded = !!(initState && events);
  [el.btnReset, el.btnStepBack, el.btnPlay, el.btnStepFwd, el.btnEnd, el.scrubber]
    .forEach((b) => { b.disabled = !loaded; });
  if (!loaded) return;
  el.btnStepBack.disabled = cursor === 0;
  el.btnStepFwd.disabled  = cursor >= events.length;
  el.btnPlay.disabled     = cursor >= events.length && !playTimer;
}

// ============================================================================
// Rendering
// ============================================================================

function renderAll() {
  if (!initState) return;
  renderBattlefield();
  highlightCurrentEventInList();
}

function renderBattlefield() {
  const lines = [...initState.lines].sort((a, b) => a.lineIndex - b.lineIndex);
  el.battlefield.innerHTML = "";
  for (const line of lines) {
    const lane = document.createElement("div");
    lane.className = "lane";
    const header = document.createElement("div");
    header.className = "lane-header " + (line.firstTeam ? "team1" : "team2");
    header.innerHTML = `<span class="pos">${line.position}</span>
      <span class="team-tag">${line.firstTeam ? "TEAM 1" : "TEAM 2"} · line ${line.lineIndex}</span>`;
    lane.appendChild(header);

    const body = document.createElement("div");
    body.className = "lane-body";

    const inLane = Object.values(live).filter((p) => p.lineIndex === line.lineIndex);
    if (inLane.length === 0) {
      body.classList.add("empty");
      body.textContent = "(empty)";
    } else {
      for (const p of inLane) body.appendChild(renderPersonage(p));
    }
    lane.appendChild(body);
    el.battlefield.appendChild(lane);
  }
}

function renderPersonage(p) {
  const div = document.createElement("div");
  const teamCls = p.firstTeam ? "team1" : "team2";
  div.className = `personage ${teamCls}`;
  if (!p.alive) div.classList.add("dead");
  if (p.flash === "move")  div.classList.add("moved");
  if (p.flash === "hit")   div.classList.add("hit");
  if (p.flash === "crit")  div.classList.add("crit");
  if (p.flash === "dodge") div.classList.add("dodge-flash");
  if (p.flash === "ready") div.classList.add("gauge-ready");

  const hpPct = Math.max(0, Math.min(100, (p.health / p.maxHealth) * 100));
  const hpLow = hpPct < 30;
  const gaugePct = Math.max(0, Math.min(100, (p.gauge / 1000) * 100));

  div.innerHTML = `
    <div class="name">
      <span>${p.firstTeam ? "T1" : "T2"} · ${shortId(p.id)}</span>
      <span class="id">init ${p.initiative}</span>
    </div>
    <div class="bar hp${hpLow ? " low" : ""}">
      <div class="fill" style="width:${hpPct}%"></div>
      <div class="label">${p.health} / ${p.maxHealth}</div>
    </div>
    <div class="bar gauge">
      <div class="fill" style="width:${gaugePct}%"></div>
      <div class="label">${p.gauge} / 1000</div>
    </div>
    <div class="stats">
      <span>rng <b>${p.range}</b></span>
      <span>thr <b>${p.threat}</b></span>
      <span>${p.advanceDirection === "TOWARD_SECOND_TEAM" ? "→" : "←"}</span>
    </div>
  `;
  if (p.popup) {
    const pop = document.createElement("div");
    pop.className = "popup " + (p.popup.kind || "");
    pop.textContent = p.popup.text;
    div.appendChild(pop);
  }
  return div;
}

function renderEventList() {
  el.eventLog.innerHTML = "";
  const frag = document.createDocumentFragment();
  // Render newest-first so new events appear at the top as replay progresses.
  for (let i = events.length - 1; i >= 0; i--) {
    const ev = events[i];
    const row = document.createElement("div");
    row.className = "event " + classifyEvent(ev);
    row.dataset.index = String(i);
    row.innerHTML = `<span class="round">R<b>${ev.round ?? "—"}</b></span><span class="desc">${describeEvent(ev)}</span>`;
    row.addEventListener("click", () => seekTo(i + 1));
    frag.appendChild(row);
  }
  el.eventLog.appendChild(frag);
}

function classifyEvent(ev) {
  if (isRoundStart(ev)) return "round-start";
  if ("gaugeAfterTick" in ev) return "tick" + (ev.turnGranted ? " ready" : "");
  if ("newLineIndex" in ev) return "move";
  if ("killerId" in ev) return "defeat";
  if ("damageTaken" in ev) return ev.roll && ev.roll.crit ? "damage crit" : "damage";
  if (isDodge(ev)) return "dodge";
  return "";
}

function describeEvent(ev) {
  if (isRoundStart(ev)) return `<b>— Round ${ev.round} —</b>`;
  if ("gaugeAfterTick" in ev) {
    const p = initState.personagesById[ev.personageId];
    const team = teamPill(p?.firstTeam);
    return `${team} ${shortId(ev.personageId)} tick → gauge ${ev.gaugeAfterTick}${ev.turnGranted ? " <b>(turn!)</b>" : ""}`;
  }
  if ("newLineIndex" in ev) {
    const p = initState.personagesById[ev.personageId];
    return `${teamPill(p?.firstTeam)} ${shortId(ev.personageId)} advanced → line ${ev.newLineIndex}`;
  }
  if (isDodge(ev)) {
    const a = initState.personagesById[ev.attackerId];
    return `${teamPill(a?.firstTeam)} ${shortId(ev.attackerId)} → ${shortId(ev.targetId)} <b>DODGED</b>`;
  }
  if ("damageTaken" in ev) {
    const a = initState.personagesById[ev.attackerId];
    const crit = ev.roll && ev.roll.crit ? " <b>CRIT</b>" : "";
    return `${teamPill(a?.firstTeam)} ${shortId(ev.attackerId)} → ${shortId(ev.targetId)} ${ev.damageTaken} dmg${crit} (hp ${ev.remainingHealth})`;
  }
  if ("killerId" in ev) {
    const a = initState.personagesById[ev.killerId];
    return `${teamPill(a?.firstTeam)} ${shortId(ev.killerId)} defeated ${shortId(ev.personageId)} ✝`;
  }
  return JSON.stringify(ev);
}

function teamPill(firstTeam) {
  if (firstTeam === undefined) return "";
  return `<span class="pill ${firstTeam ? "team1" : "team2"}">${firstTeam ? "T1" : "T2"}</span>`;
}

function currentEventRow() {
  if (!events || cursor === 0) return null;
  return el.eventLog.querySelector(`.event[data-index="${cursor - 1}"]`);
}

function highlightCurrentEventInList() {
  const prev = el.eventLog.querySelector(".event.current");
  if (prev) prev.classList.remove("current");
  const row = currentEventRow();
  if (row) row.classList.add("current");
}

function scrollEventLogToCursor() {
  const row = currentEventRow();
  if (!row) { el.eventLog.scrollTop = el.eventLog.scrollHeight; return; }
  // Rows are newest-first, so the current event sits near the top.
  // Keep it anchored at the top of the visible area for readability.
  const logRect = el.eventLog.getBoundingClientRect();
  const rowRect = row.getBoundingClientRect();
  const offset = rowRect.top - logRect.top;
  el.eventLog.scrollBy({ top: offset, behavior: "smooth" });
}

// ============================================================================
// Wire up controls
// ============================================================================

el.btnReset.addEventListener("click", () => { stopPlay(); seekTo(0); });
el.btnStepBack.addEventListener("click", () => { stopPlay(); stepBackward(); });
el.btnStepFwd.addEventListener("click", () => { stopPlay(); stepForward(); });
el.btnEnd.addEventListener("click", () => { stopPlay(); seekTo(events ? events.length : 0); });
el.btnPlay.addEventListener("click", togglePlay);
el.speed.addEventListener("input", updateSpeed);
el.skipTicks.addEventListener("change", () => seekTo(cursor)); // re-seek with new filter
el.scrubber.addEventListener("input", () => { stopPlay(); seekTo(Number(el.scrubber.value)); });

window.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === " ")       { e.preventDefault(); togglePlay(); }
  else if (e.key === "ArrowRight") { stopPlay(); stepForward(); }
  else if (e.key === "ArrowLeft")  { stopPlay(); stepBackward(); }
  else if (e.key === "Home")       { stopPlay(); seekTo(0); }
  else if (e.key === "End")        { stopPlay(); seekTo(events ? events.length : 0); }
});

updateSpeed();
updateButtons();
</script>
</body>
</html>
