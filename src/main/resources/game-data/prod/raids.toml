[[raid]]
    isEnabled = true
    code = "wolfpack"
    template = "ENEMY_GROUP"

    [raid.locales.RU]
    intro = "Волки сбиваются в стаи у самых дорог."
    description = """\
    Охотники сообщают, что обычные волки стали нападать организованно, а во главе каждой стаи идёт огромный альфа. \
    Тип атаки: рубящий (SLASH). Тип защиты: кожа (LEATHER). \
    Соберите искателей и разгоните волчью стаю, пока деревни не оказались отрезаны от столицы!"""

    [raid.locales.EN]
    intro = "Wolves are gathering into packs near the roads."
    description = """\
    Hunters report that ordinary wolves have started attacking in formation, with a huge alpha leading each pack. \
    Attack type: slash (SLASH). Defense type: leather (LEATHER). \
    Gather the seekers and break up the wolfpack before the villages are cut off from the capital!"""

    [raid.locales.ES]
    intro = "Los lobos se agrupan en manadas cerca de los caminos."
    description = """\
    Los cazadores informan que los lobos comunes han empezado a atacar de forma organizada, con un enorme alfa al frente de cada manada. \
    Tipo de ataque: cortante (SLASH). Tipo de defensa: cuero (LEATHER). \
    ¡Reúnan a los exploradores y dispersen la manada antes de que las aldeas queden aisladas de la capital!"""
