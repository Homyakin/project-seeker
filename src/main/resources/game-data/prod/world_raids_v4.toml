[[raid]]
code = "swamp-thing"
isEnabled = true

[raid.locales.RU]
intro = """\
Обнаружена мерзкая болотная тварь!

Похоже на мутировавшую слизь. Умом и сообразительностью не отличается, зато очень даже отличается \
агрессивностью и живучестью. Несколько крестьян уже успели стать её жертвами, пока ходили в лес за грибами. \
Убейте её, пока жертв не стало больше."""

[raid.locales.ES]
intro = """\
¡Se ha detectado una asquerosa criatura del pantano!

Parece una baba mutada. No se destaca por su inteligencia o astucia, pero sí por ser increíblemente \
agresiva y resistente. Ya varios campesinos han caído víctimas suyas mientras recogían hongos en el bosque. \
Mátenla antes de que haya más víctimas."""

