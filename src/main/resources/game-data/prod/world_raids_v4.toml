isEnabled = true

[raid.locales.RU]
intro = """\
Это птица? Это огненный шар? Это дракон! ДРАКОН???????

Этих тварей истребили ещё до появления Империи на карте мира. Не знаем откуда он взялся \
в окрестностях Крезара, однако необходимо срочно уничтожить его, пока он не начал нападать \
на мирное население."""

[raid.locales.ES]
intro = """\
¿Es un pájaro? ¿Es una bola de fuego? ¡Es un dragón! ¡¿UN DRAGÓN???????

Estas criaturas fueron exterminadas antes incluso de que el Imperio apareciera en el mapa del mundo. \
No sabemos de dónde ha salido en las cercanías de Krezar, pero hay que eliminarlo urgentemente \
antes de que empiece a atacar a la población pacífica."""

